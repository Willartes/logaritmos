<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Logaritmos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="app-header">
    <h1 class="app-title">Logaritmos</h1>
    <nav class="header-controls" aria-label="Controles da apresentação">
        <button type="button" class="control-btn" data-action="fullscreen" aria-label="Tela cheia (F)">
            ⛶ Tela Cheia
        </button>
        <button type="button" class="control-btn" data-action="thumbnails" aria-label="Miniaturas (T)">
            ⊞ Miniaturas
        </button>
        <button type="button" class="control-btn" data-action="auto" aria-label="Apresentação automática (A)">
            ▶ Auto
        </button>
    </nav>
</header>

<main class="app-main" role="main">
    <section class="slideshow" aria-label="Apresentação de slides: Logaritmos">
        <div class="slide-wrapper">
            <iframe
                id="slide-frame"
                class="slide-frame"
                src="slides/page_1.html"
                frameborder="0"
                scrolling="no"
                title="Slide 1"
            ></iframe>
        </div>

        <div class="slide-bar">
            <figcaption id="slide-caption" class="slide-caption">
                1 / 26 — Slide 1
            </figcaption>

            <nav class="slide-nav" aria-label="Navegação entre slides">
                <button type="button" class="nav-btn nav-btn--prev" id="prev-slide" aria-label="Slide anterior (←)">‹</button>
                <div class="slide-counter" aria-live="polite">
                    <span id="current-slide">1</span>
                    <span>/</span>
                    <span id="total-slides">26</span>
                </div>
                <button type="button" class="nav-btn nav-btn--next" id="next-slide" aria-label="Próximo slide (→)">›</button>
            </nav>
        </div>
    </section>

    <section class="thumbnails" id="thumbnails-panel" aria-label="Miniaturas dos slides" hidden>
        <ul class="thumbnails__list" id="thumbnails-list">
            <!-- preenchido via JS -->
        </ul>
    </section>
</main>

<footer class="app-footer">
    <div class="keyboard-help">
        <span><kbd>←</kbd> <kbd>→</kbd> navegar</span>
        <span>|</span>
        <span><kbd>T</kbd> miniaturas</span>
        <span>|</span>
        <span><kbd>F</kbd> tela cheia</span>
        <span>|</span>
        <span><kbd>A</kbd> auto</span>
        <span>|</span>
        <span><kbd>Esc</kbd> parar</span>
    </div>
</footer>

<script src="js/script.js"></script>
</body>
</html>
